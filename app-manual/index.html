<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BonGest</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var isWorkerRoute = path === "/worker" || path.indexOf("/worker/") === 0 || path.indexOf("/w/") === 0;
        var metadata = isWorkerRoute
          ? {
              title: "BonGest Terrain",
              description: "Application terrain pour techniciens BonGest",
              manifest: "/worker-manifest.json",
              theme: "#2f6a31",
              icon: "/worker-icon-512.png",
              icon192: "/worker-icon-192.png",
              appleTitle: "Terrain"
            }
          : {
              title: "BonGest",
              description: "BonGest, gestion operationnelle pour entreprises de services sur le terrain.",
              manifest: "/manifest.json",
              theme: "#2e7d32",
              icon: "/icon-512.png",
              icon192: "/icon-192.png",
              appleTitle: "BonGest"
            };

        document.title = metadata.title;
        document.write(
          '<meta name="description" content="' + metadata.description + '">' +
          '<link rel="manifest" href="' + metadata.manifest + '" id="app-manifest">' +
          '<meta name="theme-color" content="' + metadata.theme + '">' +
          '<meta name="mobile-web-app-capable" content="yes">' +
          '<meta name="application-name" content="' + metadata.appleTitle + '">' +
          '<meta name="apple-mobile-web-app-capable" content="yes">' +
          '<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">' +
          '<meta name="apple-mobile-web-app-title" content="' + metadata.appleTitle + '">' +
          '<link rel="icon" type="image/png" sizes="192x192" href="' + metadata.icon192 + '">' +
          '<link rel="apple-touch-icon" sizes="512x512" href="' + metadata.icon + '">' +
          '<meta name="author" content="BonGest">' +
          '<meta property="og:type" content="website">' +
          '<meta property="og:title" content="' + metadata.title + '">' +
          '<meta property="og:description" content="' + metadata.description + '">' +
          '<meta property="og:image" content="' + metadata.icon + '">' +
          '<meta name="twitter:card" content="summary_large_image">' +
          '<meta name="twitter:title" content="' + metadata.title + '">' +
          '<meta name="twitter:description" content="' + metadata.description + '">' +
          '<meta name="twitter:image" content="' + metadata.icon + '">'
        );
      })();
    </script>
    <script type="module" crossorigin src="/app-manual/assets/main-DpmtfmL6.js"></script>
    <link rel="stylesheet" crossorigin href="/app-manual/assets/main-CpiQ8vbk.css">
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
